name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install media tools and Chinese fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - run: npm ci
      - run: npm run check
